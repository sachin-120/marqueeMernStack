<!DOCTYPE html>
<html>
    <head>
        <title></title>

        <style>

           

            .container{
                display:grid;
                width:1000px;
                grid-template-columns:repeat(3,1fr);
                grid-template-rows:200px 200px 200px;
                gap:15px;
                margin:100px auto;
            }

            .container>div{
                /* border:2px solid black; */
                border-radius:15px ;
            }

            .purple{
                background: #cbb8ff;
                grid-row: 1/3;
                grid-column: 1;
            }


            .green{
                background: #d9ef9f;
                    /* grid-column: 2;
                    grid-row: 2; */
            }

            .yellow{
                background: #f8df6d;
                    /* grid-column: 3;
                    grid-row: 2; */
            }

        
            .pink{
                grid-column:2/4;
                background-color: pink;
            }

            .orange{
                grid-column:1/3;
                background: #f8b27d;
            }

            .blue{
                 grid-column: 3;
                 grid-row: 3;
                 background: #c7dceb;
            }



        </style>

    </head>
    <body>

        <main>

        <div class="container">
            <div class="purple"></div>
            <div class="pink"></div>
            <div class="green"></div>
            <div class="yellow"></div>
            <div class="orange"></div>
            <div class="blue"></div>
        </div>

        </main>

    </body>

</html>
