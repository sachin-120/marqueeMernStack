<!doctype html>
<html>
    <head>
        <title>Admin DashBoards:--></title>

        <style>

            .container{
                display:grid;
                width:1000px;
                grid-template-columns:250px 1fr 1fr;
                grid-template-rows:80px 250px 180px 80px;
                gap:15px;
            }

            .container>div{
                border:2px solid black;
            }

            .header{
                grid-column:span 3
            }

            .sidebar{
                grid-row: span 1;
            }

            .main{
                grid-column: span 2;
            }

            .sidebar{
                grid-row: span 2;
                grid-column:span 1;
            }

            .card1{
                grid-row: span 1;
            }

            .card2{
                grid-row: span 1;
            }

            .footer{
                grid-column:1/4;;
            }

        </style>

    </head>
    <body>
        
        <div class="container">
            <div class="header">Header</div>
            <div class="sidebar">Sidebar</div>
            <div class="main">main</div>
            <div class="card1">Card1</div>
            <div class="card2">Card2</div>
            <div class="footer">Footer</div>
        </div>

    </body>
</html>
