<!doctype html>
<html>
    <head>
        <title></title>
        <style>
            .container{
                display:grid;
                grid-template-columns:repeat(4,1fr);
                column-gap: 40px;
                row-gap: 40px;
                grid-template-rows: repeat();
            }
            div{
                display:flex;
                justify-content: center;
                align-items: center;
                text-align: center;
                height:100px;
            }
        </style>
    </head>
    <body>

        <div class="container">
        <div style="border: 2px solid black;">1</div>
        <div style="border: 2px solid black;">2</div>
        <div style="border: 2px solid black;">3</div>
        <div style="border: 2px solid black;">4</div>
        <div style="border: 2px solid black;">5</div>
        <div style="border: 2px solid black;">6</div>
        <div style="border: 2px solid black;">7</div>
        <div style="border: 2px solid black;">8</div>
        <div style="border: 2px solid black;">9</div>
        <div style="border: 2px solid black;">10</div>
        <div style="border: 2px solid black;">11</div>
        <div style="border: 2px solid black;">12</div>
        </div>

    </body>
</html>
