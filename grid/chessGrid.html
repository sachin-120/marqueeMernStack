<!doctype html>
<html>
    <head>
        <title>CHESS GRID PATTERN</title>

        <style>

            .container{
                display:grid;
                grid-template-columns:repeat(8,1fr);
                grid-template-rows:repeat(8,1fr);

                border:5px solid black;
            }

            .container>div{
                height:75px;
            }

            .container div:nth-child(16n+1),
            .container div:nth-child(16n+3),
            .container div:nth-child(16n+5),
            .container div:nth-child(16n+7),
            .container div:nth-child(16n+10),
            .container div:nth-child(16n+12),
            .container div:nth-child(16n+14),
            .container div:nth-child(16n+16){
                background-color:#7c9b59;
            }

            .container div:nth-child(16n+2),
            .container div:nth-child(16n+4),
            .container div:nth-child(16n+6),
            .container div:nth-child(16n+8),
            .container div:nth-child(16n+9),
            .container div:nth-child(16n+11),
            .container div:nth-child(16n+13),
            .container div:nth-child(16n+15){
                background-color:#f3f0d8;
            }

            /* .container:nth-child(odd) div:nth-child(odd),
            .container:nth-child(even) div:nth-child(even){
                background:#7c9b59;
            }

            .container:nth-child(odd) div:nth-child(even),
            .container:nth-child(even) div:nth-child(odd){
                background:#f3f0d8;
            } */




        </style>

    </head>
    <body>
