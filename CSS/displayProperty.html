<!DOCTYPE html>
<html>
    <head>
        <title>Display Property</title>

        <style>
            .red{
                background-color:red;
            }
            .blue{
                background-color:blue;
            }
            .orange{
                background-color:orange;
            }

        #container div{
            height:150px;
            width:150px;
            display:inline-block;
        }

        

        </style>
        
    </head>
    <body>

        <div id="container">
            <div class="red">Hello</div>
            <div class="blue">Hello</div>
            <div class="orange">Hello</div>
        </div>
       

    </body>
</html>
