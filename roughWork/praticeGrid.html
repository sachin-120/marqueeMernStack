<!doctype html>
<html>
    <head>
        <title>Our Pages Here:--></title>
        
        <style>

            .container{
                display:grid;
                grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
                gap:20px;
            }

            div>span{
                height:100px;
                display:grid;
                place-items:center;
                border:2px solid black;
                border-radius:12px;
            }

            .a{
                grid-column: 1/3;
            }

            .f{
                grid-column:1/3;
            }

            

        </style>
    </head>
    <body>

        <div class="container">
            <span class="a">A</span>
            <span class="b">B</span>
            <span class="c">C</span>
            <span class="d">D</span>
            <span class="e">E</span>
            <span class="f">F</span>
            <span class="g">G</span>
        </div>

    </body>
</html>
