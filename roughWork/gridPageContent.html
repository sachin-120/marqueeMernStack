<!doctype html>
<html>
    <head>
        <title></title>

        <style>
            .container{
                display:grid;
                margin:80px auto;
                grid-template-columns:250px 1fr;
                grid-template-rows:80px 300px 80px;


                 grid-template-areas:
                    "header header"
                    "sidebar content"
                    "footer footer";


                gap:10px;
            }

            .header{
                grid-area:header;
                border:2px solid black;

                display:grid;
                place-items:center;
            }

            .sidebar{
                grid-area:sidebar;
                border:2px solid black;

                display:grid;
                place-items:center;
            }

            .content{
                grid-area:content;
                border:2px solid black;

                display:grid;
                place-items:center;
            }

            .footer{
                grid-area:footer;
                border:2px solid black;

                display:grid;
                place-items:center;
            }



        </style>

    </head>
    <body>
        <div class="container">
            <div class="header">HEADER</div>
            <div class="sidebar">SIDEBAR</div>
            <div class="content">CONTENT</div>
            <div class="footer">FOOTER</div>
        </div>
    </body>
</html>
