<!DOCTYPE html>
<html>
    <head>
        <title></title>
    </head>    
    <body>
        <h1>Sports Physical For</h1>
        
        <form action="action.html">
            <fieldset>
                <legend><h2>Athelete Information</h2></legend>
                <ul>
                    <li><label for="name">Name :</label>
                <input type="" id="name"></li>
                <li>
                    <label for="school">School/Team :</label>
                    <input type="text" id="school" name="school">
                </li>

                <li>
                    <label>
                        <label  for="sport">Sports :</label>
                        <input type="text" id="sport" name="sport">
                    </label>
                </li>

                <li>
                    <label for="parent">Parent/Guardian Name :</label>
                    <input type="text" id="parent" name="parent">
                </li>

                <li>
                    <label id="contact">COntact Number :</label>
                    <input type="number" id="contact" name="contactNumber">
                </li>
                </ul>
                

            </fieldset>

            <fieldset>
                <legend><h2>Medical History For Information</h2></legend>

                <ul>
                    
                    <li>History Of Concussion 
                    <label for="history_conculusion_yes">Yes</label>
                    <input type="radio" name="history_conculusion" id="history_conculusion_yes"  value="history_conculsion_yes">
                    <label for="history_conculusion_no">No</label>
                    <input type="radio" name="history_conculusion" id="history_conculusion_no" value="history_conculsion_no">
                </li>
           
                    <li>
                    <label for="surgery">Previous surgeries:</label>
                    <input type="text" id="surgery" style="border:none;border-bottom:2px dotted black;outline:none">
                </li>

                <li>
                    <label>
                        <label  for="sport">Sports :</label>
                        <input type="text" id="sport" name="sport">
                    </label>
                </li>

                <li>Any Bone Fracture
                    <label for="boneFracture_yes">Yes</label>
                    <input type="radio" name="boneFracture" id="boneFracture"  value="boneFracture_yes">
                    <label for="boneFracture_no">No</label>
                    <input type="radio" name="boneFracture" id="boneFracture_no" value="boneFracture_no">
                </li>
                

                <li>Asthma or breathing promblems
                    <label for="breathing_yes">Yes</label>
                    <input type="radio" name="breathing" id="breathing_yes"  value="breathing_yes">
                    <label for="breathing_no">No</label>
                    <input type="radio" name="breathing" id="breathing_no" value="breathing_no">
                </li>
                </ul>
            </fieldset>

            <fieldset>
                <legend><h2>Select Your Department</h2></legend>
                <select name="department" id="department">
                    <option>Select Your Department</option>
                    <option value="BIOTECH">BIOTECH</option>
                    <option value="CYBER">CYBER</option>
                    <option value="AI">AI</option>
                    <option value="AIML">AIML</option>
                </select>
            </fieldset>

            <fieldset>
                <legend><h2>Select Your Hobby</h2></legend>
                <label for="cricket">Cricket</label>
                <input type="checkbox" id="cricket" name="hobby" value="cricket">
                <label for="football">FootBall</label>
                <input type="checkbox" id="football" name="hobby" value="football">
                <label for="hockey">Hockey</label>
                <input type="checkbox" id="hockey" name="hobby" value="hockey">

            </fieldset>

            <fieldset>
                <legend>Feedback Messages</legend>
                <textarea col="50" row="50"></textarea>
                <input type="email" name="email">
                <input type="password" name="password">
                <input type="date" name="password">
                <input type="number" name="number">
                <input type="file" name="file" accept="">
            </fieldset>

            <fieldset>
                <legend><h2>Doctor Recommendation For Sport Partiton</h2></legend>

                <ul>
                    <li><label for="name">Name :</label>
                <input type="" id="name"></li>
                <li>
                    <label for="school">School/Team :</label>
                    <input type="text" id="school" name="school">
                </li>

                <li>
                    <label>
                        <label  for="sport">Sports :</label>
                        <input type="text" id="sport" name="sport">
                    </label>
                </li>

                <li>
                    <label for="parent">Parent/Guardian Name :</label>
                    <input type="text" id="parent" name="parent">
                </li>

                <li>
                    <label id="contact">COntact Number :</label>
                    <input type="number" id="contact" name="contactNumber">
                </li>
                </ul>

            </fieldset>

            <fieldset>
                <legend>Table</legend>
                <tabel border="2">
                    <td></td>
                </tabel>
            </fieldset>

            <button>Submit</button>

        </form>

    </body>
</html>
